name: Flutter Analyze

on:
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: flutter analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # Pinned to match ci.yml and the team's local SDK. A floating "3.x"
          # silently upgraded to 3.44.7 and failed every PR on framework API
          # drift unrelated to the diff under review.
          flutter-version: 3.38.8
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings
