name: nibbles
description: "A guided baby solids app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  alice: ^1.0.0-dev.12
  auto_size_text: ^3.0.0
  cached_network_image: ^3.2.3
  collection: ^1.19.1
  crypto: ^3.0.0
  dio: ^5.8.0+1
  easy_localization: ^3.0.1
  firebase_analytics: ^11.4.0
  firebase_core: ^3.10.0
  firebase_crashlytics: ^4.3.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.0
  flutter_screenutil: ^5.6.0
  flutter_svg: ^2.0.4
  formz: ^0.8.0
  freezed_annotation: ^2.4.0
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  json_annotation: ^4.9.0
  jwt_decoder: ^2.0.1
  logger: any
  purchases_flutter: ^7.0.0
  retrofit: ^4.4.2
  riverpod_annotation: ^2.6.0
  sign_in_with_apple: ^7.0.1
  supabase_flutter: ^2.0.0
  table_calendar: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.0
  custom_lint: ^0.7.0
  flutter_gen_runner: ^5.2.0
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.3
  network_image_mock: ^2.1.1
  retrofit_generator: ^9.3.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.6.0
  very_good_analysis: ^7.0.0

dependency_overrides:
  analyzer_plugin: ^0.13.0
  intl: ^0.18.0
  # retrofit_generator 9.3.0 doesn't handle Parser.DartMappable added in
  # retrofit 4.9.x — pin retrofit below that version.
  retrofit: ">=4.4.2 <4.9.0"

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
  assets:
    exclude:
      - .env.dev
      - .env.prod
      # Bundled Figtree font files are resolved by google_fonts via the
      # AssetManifest, not referenced through the generated accessor.
      - google_fonts/Figtree-Regular.ttf
      - google_fonts/Figtree-SemiBold.ttf
      - google_fonts/Figtree-Bold.ttf
      - google_fonts/OFL.txt

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/jsons/
    # Figtree body font — bundled so google_fonts resolves from assets (no
    # runtime HTTP fetch). Files MUST keep the Google Fonts API names so
    # GoogleFonts.figtree() matches them. NOT declared under `fonts:` on
    # purpose — google_fonts discovers them via the AssetManifest instead.
    - google_fonts/Figtree-Regular.ttf
    - google_fonts/Figtree-SemiBold.ttf
    - google_fonts/Figtree-Bold.ttf
    - google_fonts/OFL.txt

  fonts:
    - family: Parkinsans
      fonts:
        - asset: assets/fonts/Parkinsans-Light.ttf
          weight: 300
        - asset: assets/fonts/Parkinsans-Regular.ttf
          weight: 400
        - asset: assets/fonts/Parkinsans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Parkinsans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Parkinsans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Parkinsans-ExtraBold.ttf
          weight: 800

# Native OS launch screen (shown before Flutter boots). Flat cream (#FFFDF8)
# matches the Flutter splash background exactly so there is no color flash on
# handoff. The quatrefoil mark (transparent background) floats centered on
# cream. Regenerate native assets with:
#   dart run flutter_native_splash:create
# Shared ios/Runner + android/app/src/main assets cover both dev and prod
# flavors (flavors differ only by bundle id / app name).
flutter_native_splash:
  color: "#FFFDF8"
  image: assets/images/launch_quatrefoil.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  # Android 12+ uses the system splash API: flat cream window + centered icon.
  android_12:
    color: "#FFFDF8"
    image: assets/images/launch_quatrefoil.png
