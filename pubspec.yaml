name: nibbles
description: "A guided baby solids app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Code generation annotations
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0+1
  retrofit: ^4.4.2

  # Debug/logging
  logger: any
  alice: ^1.0.0-dev.12

  # Backend
  supabase_flutter: ^2.0.0

  # Subscriptions
  purchases_flutter: ^7.0.0

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.10.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0

  # Localisation
  easy_localization: ^3.0.1

  # UI utilities
  flutter_screenutil: ^5.6.0
  flutter_svg: ^2.0.4
  cached_network_image: ^3.2.3
  auto_size_text: ^3.0.0
  table_calendar: ^3.1.3
  flutter_animate: ^4.5.2

  # Utilities
  collection: ^1.19.1
  flutter_dotenv: ^5.2.1
  formz: ^0.8.0
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.9.0
  retrofit_generator: ^9.3.0
  flutter_gen_runner: ^5.2.0
  riverpod_generator: ^2.4.0

  # Linting
  very_good_analysis: ^7.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.0

  # Testing
  mocktail: ^1.0.3
  network_image_mock: ^2.1.1

dependency_overrides:
  intl: ^0.18.0
  analyzer: ^7.0.0

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/jsons/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
