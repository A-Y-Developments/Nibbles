<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nibbles mobile UI kit</title>
  <link rel="stylesheet" href="kit.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    .stage-frame {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 18px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 36px 22px 60px;
    }
    .side {
      padding: 28px 22px;
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(20,30,12,0.08);
    }
    .side h3 { font: 800 17px/1.2 var(--font-display); color: var(--color-green-deep); margin: 0 0 6px; }
    .side p  { font: var(--t-callout); color: var(--fg-default); margin: 0 0 14px; }
    .side .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .screen-pick {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left;
      background: transparent; border: 1px solid var(--border-soft);
      padding: 10px 12px; border-radius: 14px;
      cursor: pointer;
      font: 700 14px/1 var(--font-display); color: var(--fg-strong);
    }
    .screen-pick:hover { background: var(--color-butter-soft); }
    .screen-pick.is-active { background: var(--color-green-deep); color: var(--color-cream); border-color: var(--color-green-deep); }
    .screen-pick small { font: 600 11px/1 var(--font-system); color: inherit; opacity: 0.7; margin-left: auto; }
    .footer-note { font: var(--t-caption); color: var(--fg-faint); margin-top: 22px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="HomeScreen.jsx"></script>
  <script type="text/babel" src="ShoppingListScreen.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>
  <script type="text/babel" src="OnboardingScreen.jsx"></script>
  <script type="text/babel" src="PlanAndRecipes.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const SCREENS = [
      { id: 'onboarding', label: 'Onboarding', tab: null,        title: '01 Onboarding' },
      { id: 'home',       label: 'Home',       tab: 'home',      title: '02 Home' },
      { id: 'meals',      label: 'Meal plan',  tab: 'meals',     title: '03 Meal plan' },
      { id: 'grocery',    label: 'Grocery',    tab: 'grocery',   title: '04 Shopping list' },
      { id: 'recipes',    label: 'Recipes',    tab: 'recipes',   title: '05 Recipes' },
      { id: 'profile',    label: 'Profile',    tab: null,        title: '06 Profile' },
      { id: 'profile-edit', label: 'Profile · edit', tab: null,  title: '07 Edit profile' },
    ];

    const StatusBar = () => (
      <div className="phone__status">
        <span>9:41</span>
        <span className="group">
          <svg viewBox="0 0 18 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="9" rx="1"/><rect x="15" y="0" width="3" height="11" rx="1"/></svg>
          <svg viewBox="0 0 16 12" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M1 4.5C3 2.5 5.5 1.5 8 1.5s5 1 7 3"/><path d="M3 7c1.5-1.5 3-2 5-2s3.5.5 5 2"/><circle cx="8" cy="9.5" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 12" fill="none" stroke="currentColor" strokeWidth="1.2"><rect x="0.5" y="0.5" width="21" height="11" rx="3"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
        </span>
      </div>
    );

    function App() {
      const [screen, setScreen] = useState('home');
      const cur = SCREENS.find(s => s.id === screen) || SCREENS[1];

      const renderScreen = () => {
        switch (screen) {
          case 'onboarding':   return <OnboardingScreen onDone={() => setScreen('home')}/>;
          case 'home':         return <HomeScreen/>;
          case 'meals':        return <MealPlanScreen/>;
          case 'grocery':      return <ShoppingListScreen/>;
          case 'recipes':      return <RecipesScreen/>;
          case 'profile':      return <ProfileScreen onEdit={() => setScreen('profile-edit')}/>;
          case 'profile-edit': return <ProfileEditScreen onBack={() => setScreen('profile')}/>;
        }
      };

      return (
        <div className="stage-frame">
          <aside className="side">
            <h3>Nibbles · Mobile UI kit</h3>
            <p>Click any screen to load it on the phone. Tap-thru is interactive — check items off, tab between flows, navigate the onboarding.</p>
            <div className="gap-2" style={{ marginTop: 14 }}>
              {SCREENS.map(s => (
                <button key={s.id} className={"screen-pick" + (screen === s.id ? " is-active" : "")} onClick={() => setScreen(s.id)} data-screen-label={s.title}>
                  {s.label}<small>{s.tab ? '· tab' : '· flow'}</small>
                </button>
              ))}
            </div>
            <p className="footer-note">390 × 844 (iPhone 14). Generously rounded, pill CTAs, butter-yellow active states, sage-green primary. See <code>../../README.md</code> for full system docs.</p>
          </aside>

          <main className="stage" style={{ padding: 0 }}>
            <div className="phone" data-screen-label={cur.title}>
              <StatusBar/>
              <div className="phone__body">
                {renderScreen()}
                {cur.tab && <TabBar active={cur.tab} onChange={(t) => {
                  const next = SCREENS.find(s => s.tab === t);
                  if (next) setScreen(next.id);
                }}/>}
              </div>
              <div className="phone__home-indicator"/>
            </div>
          </main>

          <aside className="side">
            <h3>What's inside</h3>
            <p>Primitives are exported on <code>window</code> for screens to reuse:</p>
            <div className="chip-grid">
              {['TopBar','TabBar','PillButton','RoundButton','Chip','Tip','Avatar','Quatrefoil','NibblesIcons'].map((n,i)=>(
                <span key={i} style={{ font: '600 11px/1 var(--font-system)', color: 'var(--color-green-deep)', background: 'var(--color-butter-soft)', padding: '6px 8px', borderRadius: 8 }}>{n}</span>
              ))}
            </div>
            <p className="footer-note">Each screen sits in its own <code>.jsx</code> file and consumes the primitives. Recipes &amp; meal-plan tabs are scaffolded but light on content — extend by copying the Figma <code>/Hifid</code> screens you need.</p>
          </aside>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
