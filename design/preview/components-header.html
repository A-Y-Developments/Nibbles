<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .phone { width: 380px; border-radius: 28px; overflow: hidden; box-shadow: var(--shadow-card-lifted); background: var(--bg-card); margin: 0 auto; }
    .header { background: linear-gradient(180deg, var(--color-butter) 0%, var(--color-butter-soft) 100%); padding: 14px 18px 22px; }
    .topline { display: flex; align-items: center; justify-content: space-between; }
    .btn-back { width: 44px; height: 44px; border-radius: 999px; background: var(--bg-card); display: grid; place-items: center; color: var(--color-green-deep); }
    .avatar { width: 36px; height: 36px; border-radius: 999px; background: var(--color-green-deep); color: var(--color-cream); display: grid; place-items: center; font: 700 14px/1 var(--font-display); }
    .title { font: 700 17px/1 var(--font-display); color: var(--fg-strong); }
    .h1 { font: 700 22px/1.2 var(--font-display); color: var(--fg-strong); margin-top: 14px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="topline">
        <div class="btn-back">←</div>
        <div class="title">Nibbles</div>
        <div class="avatar">A</div>
      </div>
      <div class="h1">Oliver is 6 months 12 days today! 🎉</div>
    </div>
  </div>
</body>
</html>
