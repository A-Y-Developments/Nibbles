<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 18px 22px; font-family: var(--font-body); }
    .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
    .sw { display: flex; flex-direction: column; gap: 4px; }
    .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; border: 1px solid rgba(0,0,0,0.04); }
    .lbl { font: 600 10px/1.2 var(--font-display); color: var(--fg-strong); }
    .hex { font: 400 9px/1.2 var(--font-system); color: var(--fg-faint); letter-spacing: 0.02em; }
    h4 { font: var(--t-subhead); margin: 0 0 10px; color: var(--color-green-deep); }
  </style>
</head>
<body>
  <h4>Orange / Coral scale — illustration, progress, food iconography</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFE2CF"></div><div class="lbl">orange/10</div><div class="hex">FFE2CF</div></div>
    <div class="sw"><div class="chip" style="background:#FFCEAF"></div><div class="lbl">orange/20</div><div class="hex">FFCEAF</div></div>
    <div class="sw"><div class="chip" style="background:#FFB687"></div><div class="lbl">orange/30</div><div class="hex">FFB687</div></div>
    <div class="sw"><div class="chip" style="background:#FF9E5F"></div><div class="lbl">orange/40</div><div class="hex">FF9E5F</div></div>
    <div class="sw"><div class="chip" style="background:#FF8537"></div><div class="lbl">orange/50</div><div class="hex">FF8537</div></div>
    <div class="sw"><div class="chip" style="background:#FF6D0F"></div><div class="lbl">base</div><div class="hex">FF6D0F</div></div>
    <div class="sw"><div class="chip" style="background:#D55B0D"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #D55B0D">orange/60</div><div class="hex">D55B0D</div></div>
    <div class="sw"><div class="chip" style="background:#AA490A"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #AA490A">orange/70</div><div class="hex">AA490A</div></div>
    <div class="sw"><div class="chip" style="background:#803708"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #803708">orange/80</div><div class="hex">803708</div></div>
    <div class="sw"><div class="chip" style="background:#552405"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #552405">orange/90</div><div class="hex">552405</div></div>
    <div class="sw"><div class="chip" style="background:#331603"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #331603">orange/100</div><div class="hex">331603</div></div>
  </div>
</body>
</html>
