<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--color-cream); padding: 22px; display: grid; gap: 14px; }
    .card { background: var(--bg-card); border-radius: var(--r-xl); padding: 14px 16px; }
    .tip { background: var(--bg-card-tint); border-radius: var(--r-xl); padding: 14px 16px; display: flex; gap: 12px; }
    .tip .ico { width: 28px; height: 28px; border-radius: 999px; background: var(--color-green-deep); color: var(--color-butter); display: flex; align-items: center; justify-content: center; font: 700 14px/1 var(--font-system); flex: none; }
    .row { display: flex; align-items: center; gap: 12px; }
    .thumb { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg,#FFE0A9,#F8A175); flex: none; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .meta { font: 700 14px/1.3 var(--font-display); color: var(--fg-strong); }
    .sub  { font: var(--t-caption); color: var(--fg-faint); margin-top: 2px; }
    .pill { display: inline-flex; align-items:center; gap: 4px; height: 22px; padding: 0 8px; border-radius: 999px; background: var(--color-coral-soft); color: var(--color-coral-deep); font: 700 11px/1 var(--font-display); }
    h5 { font: 700 11px/1 var(--font-display); color: var(--fg-faint); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div>
    <h5>Tip card · butter-soft fill</h5>
    <div class="tip">
      <div class="ico">i</div>
      <div>
        <div class="meta">Getting Started Tips</div>
        <div class="t-callout" style="margin-top:2px">Start with single-ingredient purees and introduce one new food every 3–5 days to monitor for reactions.</div>
      </div>
    </div>
  </div>
  <div>
    <h5>Meal card · white surface</h5>
    <div class="card">
      <div class="row">
        <div class="thumb">🍲</div>
        <div style="flex:1">
          <div class="meta">Chicken Liver, Apple &amp; Sweet Potato Purée</div>
          <div style="margin-top:6px;display:flex;gap:6px"><span class="pill">🍎 Fruit</span><span class="pill">⚡ Iron Rich</span><span class="pill" style="background:#F2F4F3;color:#6B7280">+2</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
