<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 18px 22px; font-family: var(--font-body); }
    .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
    .sw { display: flex; flex-direction: column; gap: 4px; }
    .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; border: 1px solid rgba(0,0,0,0.04); }
    .lbl { font: 600 10px/1.2 var(--font-display); color: var(--fg-strong); }
    .hex { font: 400 9px/1.2 var(--font-system); color: var(--fg-faint); letter-spacing: 0.02em; }
    h4 { font: var(--t-subhead); margin: 0 0 10px; color: var(--color-green-deep); }
  </style>
</head>
<body>
  <h4>Tan / Wheat scale — warm neutral, surfaces &amp; backgrounds</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFF9EE"></div><div class="lbl">tan/10</div><div class="hex">FFF9EE</div></div>
    <div class="sw"><div class="chip" style="background:#FFF5E2"></div><div class="lbl">tan/20</div><div class="hex">FFF5E2</div></div>
    <div class="sw"><div class="chip" style="background:#FFF0D4"></div><div class="lbl">tan/30</div><div class="hex">FFF0D4</div></div>
    <div class="sw"><div class="chip" style="background:#FFEAC6"></div><div class="lbl">tan/40</div><div class="hex">FFEAC6</div></div>
    <div class="sw"><div class="chip" style="background:#FFE5B7"></div><div class="lbl">tan/50</div><div class="hex">FFE5B7</div></div>
    <div class="sw"><div class="chip" style="background:#FFE0A9"></div><div class="lbl">base</div><div class="hex">FFE0A9</div></div>
    <div class="sw"><div class="chip" style="background:#D5BB8D"></div><div class="lbl">tan/60</div><div class="hex">D5BB8D</div></div>
    <div class="sw"><div class="chip" style="background:#AA9571"></div><div class="lbl">tan/70</div><div class="hex">AA9571</div></div>
    <div class="sw"><div class="chip" style="background:#807055"></div><div class="lbl">tan/80</div><div class="hex">807055</div></div>
    <div class="sw"><div class="chip" style="background:#554B38"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #554B38">tan/90</div><div class="hex">554B38</div></div>
    <div class="sw"><div class="chip" style="background:#332D22"></div><div class="lbl" style="color:#fff;text-shadow:0 0 4px #332D22">tan/100</div><div class="hex">332D22</div></div>
  </div>
</body>
</html>
