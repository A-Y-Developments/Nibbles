<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
    .it { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ic { width: 56px; height: 56px; border-radius: 999px; background: var(--color-coral-soft); display: grid; place-items: center; font-size: 26px; }
    .nm { font: 700 11px/1.2 var(--font-display); color: var(--fg-strong); text-align: center; }
    .num { font: 600 10px/1 var(--font-system); color: var(--fg-faint); }
    h5 { font: 700 11px/1 var(--font-display); color: var(--fg-faint); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <h5>9 major allergens · canonical sequence from allergen_emoji.dart</h5>
  <div class="grid">
    <div class="it"><div class="ic">🥜</div><div class="nm">Peanut</div><div class="num">1</div></div>
    <div class="it"><div class="ic">🥚</div><div class="nm">Egg</div><div class="num">2</div></div>
    <div class="it"><div class="ic">🥛</div><div class="nm">Dairy</div><div class="num">3</div></div>
    <div class="it"><div class="ic">🌰</div><div class="nm">Tree Nuts</div><div class="num">4</div></div>
    <div class="it"><div class="ic">🫘</div><div class="nm">Sesame</div><div class="num">5</div></div>
    <div class="it"><div class="ic">🫘</div><div class="nm">Soy</div><div class="num">6</div></div>
    <div class="it"><div class="ic">🌾</div><div class="nm">Wheat</div><div class="num">7</div></div>
    <div class="it"><div class="ic">🐟</div><div class="nm">Fish</div><div class="num">8</div></div>
    <div class="it"><div class="ic">🦐</div><div class="nm">Shellfish</div><div class="num">9</div></div>
  </div>
</body>
</html>
