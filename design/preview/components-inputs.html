<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    label { display: block; font: 700 13px/1.4 var(--font-display); color: var(--fg-strong); margin-bottom: 6px; }
    .field { width: 100%; height: 44px; padding: 0 14px; border-radius: var(--r-md); border: 1px solid var(--border-soft); background: var(--bg-input); font: var(--t-body); color: var(--fg-strong); box-sizing: border-box; }
    .field::placeholder { color: var(--color-green-soft); }
    .field.focused { background: var(--bg-card); border-color: var(--color-green-deep); box-shadow: 0 0 0 3px rgba(92,120,82,0.15); }
    .field.error { border-color: #E53E3E; background: #FFF5F5; }
    .err { font: var(--t-caption); color: #E53E3E; margin-top: 4px; }
    .search { display: flex; align-items: center; gap: 8px; height: 44px; padding: 0 14px; border-radius: var(--r-full); background: var(--bg-input); }
    .search input { border: 0; background: transparent; outline: none; flex: 1; font: var(--t-body); color: var(--fg-strong); }
    .search svg { color: var(--color-green-deep); flex: none; }
  </style>
</head>
<body>
  <div class="grid">
    <div>
      <label>First Name</label>
      <input class="field" value="Asther" />
    </div>
    <div>
      <label>Email</label>
      <input class="field focused" placeholder="asther393@gmail.com" />
    </div>
    <div>
      <label>Password</label>
      <input class="field error" type="password" value="••••" />
      <div class="err">Must be at least 8 characters.</div>
    </div>
    <div>
      <label>Search</label>
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        <input placeholder="Search recipes…" />
      </div>
    </div>
  </div>
</body>
</html>
