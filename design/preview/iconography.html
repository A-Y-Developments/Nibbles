<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
    .it { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ico { width: 44px; height: 44px; border-radius: 14px; background: var(--color-butter-soft); color: var(--color-green-deep); display: grid; place-items: center; }
    .ico svg { width: 22px; height: 22px; }
    .nm { font: 600 10px/1.2 var(--font-system); color: var(--fg-faint); text-align: center; }
    h5 { font: 700 11px/1 var(--font-display); color: var(--fg-faint); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }
    .note { margin-top: 12px; font: var(--t-caption); color: var(--fg-faint); }
  </style>
</head>
<body>
  <h5>UI icons · stroke 2 · 24px grid · Lucide (CDN)</h5>
  <div class="grid">
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></div><div class="nm">home</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12c0-4 4-7 8-7s8 3 8 7"/><path d="M2 12h20"/></svg></div><div class="nm">meals</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M3 4h2l3 11h11l2-8H6"/></svg></div><div class="nm">cart</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h12a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/><path d="M4 17a3 3 0 0 1 3-3h12"/></svg></div><div class="nm">recipe</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg></div><div class="nm">search</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="nm">plus</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M3 6h18"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg></div><div class="nm">trash</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="nm">check</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div><div class="nm">chevron</div></div>
    <div class="it"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12" y2="16.5"/></svg></div><div class="nm">info</div></div>
  </div>
  <div class="note">Emoji is used purposefully in copy ("🎉" after a milestone) and as allergen pictograms (🥜 🥚 🥛 🌰 🫘 🌾 🐟 🦐). UI affordance icons stay Lucide-style monoline.</div>
</body>
</html>
