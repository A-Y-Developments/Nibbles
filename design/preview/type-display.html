<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px 26px; }
    .row { display: flex; align-items: baseline; gap: 18px; padding: 10px 0; border-top: 1px dashed var(--border-soft); }
    .row:first-of-type { border-top: 0; }
    .meta { font: 600 11px/1.2 var(--font-system); color: var(--fg-faint); letter-spacing: 0.04em; text-transform: uppercase; min-width: 168px; }
    h4 { font: var(--t-subhead); margin: 0 0 8px; color: var(--color-green-deep); }
  </style>
</head>
<body>
  <h4>Display &amp; title scale — Parkinsans Bold</h4>
  <div class="row"><span class="meta">Title 1 · 28/34 · 700</span><h1>Oliver is 6 months 12 days today! 🎉</h1></div>
  <div class="row"><span class="meta">Title 2 · 22/28 · 700</span><h2>Today's meals are looking great</h2></div>
  <div class="row"><span class="meta">Title 3 · 20/26 · 700</span><h3>Map Meals Plan</h3></div>
  <div class="row"><span class="meta">Headline · 17/22 · 600</span><span class="t-headline">Getting Started Tips</span></div>
</body>
</html>
