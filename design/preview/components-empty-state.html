<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .es { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-xl); padding: 18px; text-align: center; }
    .es .illus { width: 96px; height: 96px; margin: 0 auto 10px; display: grid; place-items: center; }
    .es .illus svg { width: 100%; height: 100%; }
    .ttl { font: 700 16px/1.2 var(--font-display); color: var(--fg-strong); }
    .sub { font: var(--t-caption); color: var(--fg-faint); margin: 4px 0 12px; max-width: 220px; margin-left: auto; margin-right: auto; }
    .btn { display: inline-flex; height: 36px; align-items: center; padding: 0 18px; border-radius: 999px; background: var(--color-green-deep); color: var(--color-cream); font: 700 13px/1 var(--font-display); border: 0; cursor: pointer; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="es">
      <div class="illus">
        <!-- Butter-yellow quatrefoil with sage center, matches the brand mark; used as empty illustration -->
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EAEC8C" d="M60 8c14 0 22 8 22 22 0 4-1 8-3 11 9 3 17 12 17 23 0 14-9 22-22 22-4 0-8-1-11-3-3 9-12 17-23 17-14 0-22-9-22-22 0-4 1-8 3-11-9-3-17-12-17-23 0-14 9-22 22-22 4 0 8 1 11 3 3-9 12-17 23-17z" transform="translate(2 2)"/>
          <circle cx="60" cy="60" r="22" fill="#5C7852"/>
        </svg>
      </div>
      <div class="ttl">You don't have any list yet</div>
      <div class="sub">Add an ingredient to start your shopping list for Oliver.</div>
      <button class="btn">+ Add ingredient</button>
    </div>
    <div class="es">
      <div class="illus">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EAEC8C" d="M60 8c14 0 22 8 22 22 0 4-1 8-3 11 9 3 17 12 17 23 0 14-9 22-22 22-4 0-8-1-11-3-3 9-12 17-23 17-14 0-22-9-22-22 0-4 1-8 3-11-9-3-17-12-17-23 0-14 9-22 22-22 4 0 8 1 11 3 3-9 12-17 23-17z" transform="translate(2 2)"/>
          <circle cx="60" cy="60" r="22" fill="#5C7852"/>
        </svg>
      </div>
      <div class="ttl">Ready to Start?</div>
      <div class="sub">Begin Oliver's food journey by creating your first meal plan and introducing allergens safely.</div>
      <button class="btn">Create First Meal</button>
    </div>
  </div>
</body>
</html>
