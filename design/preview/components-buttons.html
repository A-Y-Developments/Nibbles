<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; background: var(--bg-card); padding: 22px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
    .col h5 { font: 700 11px/1 var(--font-display); color: var(--fg-faint); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .btn-primary { display:inline-flex; align-items:center; justify-content:center; height: 44px; padding: 0 22px; border-radius: var(--r-full); border: 0; background: var(--color-green-deep); color: var(--color-cream); font: 700 15px/1 var(--font-display); cursor: pointer; }
    .btn-primary:hover { background: var(--color-green); }
    .btn-secondary { display:inline-flex; align-items:center; justify-content:center; height: 44px; padding: 0 22px; border-radius: var(--r-full); border: 1.5px solid var(--color-green-deep); background: transparent; color: var(--color-green-deep); font: 700 15px/1 var(--font-display); cursor: pointer; }
    .btn-ghost { display:inline-flex; align-items:center; justify-content:center; height: 44px; padding: 0 22px; border-radius: var(--r-full); border: 0; background: var(--color-butter); color: var(--color-green-deep); font: 700 15px/1 var(--font-display); cursor: pointer; }
    .btn-destructive { display:inline-flex; align-items:center; justify-content:center; height: 44px; padding: 0 22px; border-radius: var(--r-full); border: 0; background: var(--color-red); color: var(--color-cream); font: 700 15px/1 var(--font-display); cursor: pointer; }
    .btn-disabled { display:inline-flex; align-items:center; justify-content:center; height: 44px; padding: 0 22px; border-radius: var(--r-full); border: 0; background: #D9D9D9; color: #FFFDF8; font: 700 15px/1 var(--font-display); cursor: not-allowed; }
    .btn-small { height: 32px; padding: 0 14px; font-size: 13px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <h5>Primary · Pill, sage</h5>
      <div class="row">
        <button class="btn-primary">Create First Meal</button>
        <button class="btn-primary btn-small">Save</button>
      </div>
    </div>
    <div class="col">
      <h5>Secondary · Outline</h5>
      <div class="row">
        <button class="btn-secondary">Cancel</button>
        <button class="btn-secondary btn-small">Edit</button>
      </div>
    </div>
    <div class="col">
      <h5>Ghost · Butter pill</h5>
      <div class="row">
        <button class="btn-ghost">Edit</button>
        <button class="btn-ghost btn-small">+ Add</button>
      </div>
    </div>
    <div class="col">
      <h5>Destructive &amp; disabled</h5>
      <div class="row">
        <button class="btn-destructive">Delete</button>
        <button class="btn-disabled">Continue</button>
      </div>
    </div>
  </div>
</body>
</html>
